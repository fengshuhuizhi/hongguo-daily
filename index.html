<body>
  <article class="page">
    <header class="daily-header">
      <h1>红果短剧热榜日报</h1>
      <p class="subtitle">抖音旗下红果短剧平台每日热度排行追踪</p>
      <div class="date-badge" id="dateDisplay">加载中...</div>
      <div class="stats-time" id="statsTime">统计截止时间：加载中...</div>
      <div class="today-time" id="todayTime">今天：加载中...</div>

      <!-- Main Category: 短剧 / AI漫剧 -->
      <div class="category-switcher">
        <button class="category-btn active drama" id="catDrama" onclick="switchCategory('drama')">🎬 真人短剧</button>
        <button class="category-btn ai" id="catAi" onclick="switchCategory('ai')">🤖 AI漫剧</button>
      </div>

      <!-- Sub Category: 总榜 / 男频 / 女频 -->
      <div class="sub-category-switcher">
        <button class="sub-category-btn active" id="subAll" onclick="switchSubCategory('all')">🏆 总榜</button>
        <button class="sub-category-btn" id="subNanpin" onclick="switchSubCategory('nanpin')">👑 男频</button>
        <button class="sub-category-btn" id="subNvpin" onclick="switchSubCategory('nvpin')">💃 女频</button>
      </div>

      <!-- Tab: 热播 / 飙升 -->
      <div class="tab-switcher">
        <button class="tab-btn active" id="tabHot" onclick="switchTab('hot')">🔥 热播榜</button>
        <button class="tab-btn" id="tabRising" onclick="switchTab('rising')">📈 飙升榜</button>
      </div>

      <div class="date-picker-wrap">
        <label>选择日期：</label>
        <input type="date" id="datePicker" />
        <button class="btn-today" id="btnToday">回到今天</button>
      </div>
    </header>

    <div id="loadingState" class="loading">
      <div class="loading-spinner"></div>
      <p>正在加载今日热榜数据...</p>
    </div>

    <div id="errorState" class="error-box" style="display:none;">
      <h3>数据加载失败</h3>
      <p>请检查网络连接或稍后重试</p>
    </div>

    <div id="contentState" style="display:none;">
      <!-- Overview -->
      <section>
        <h2 id="overviewTitle"><span class="icon">📊</span> 今日概览</h2>
        <div class="stats-grid" id="overviewGrid"></div>
      </section>

      <!-- Hot List with Analysis -->
      <section>
        <h2 id="hotListTitle"><span class="icon">🔥</span> 热播榜</h2>
        <div class="hot-list" id="hotList"></div>
      </section>

      <!-- Tags -->
      <section>
        <h2 id="tagsTitle"><span class="icon">🏷️</span> 热门题材标签</h2>
        <div class="tag-cloud" id="tagCloud"></div>
      </section>

      <!-- Chart -->
      <section>
        <h2 id="chartTitle"><span class="icon">📈</span> 热度趋势对比</h2>
        <div class="chart-container">
          <div id="chart-heat" style="width:100%;min-height:400px"></div>
        </div>
      </section>

      <!-- Insights -->
      <section>
        <h2 id="insightsTitle"><span class="icon">💡</span> 行业洞察</h2>
        <div id="insights"></div>
      </section>

      <!-- Upcoming -->
      <section>
        <h2 id="upcomingTitle"><span class="icon">📅</span> 即将上线</h2>
        <div class="hot-list" id="upcomingList"></div>
      </section>
    </div>

    <footer>
      <p>数据来源：红果短剧官方榜单、今日头条、DataEye等第三方数据机构</p>
      <p id="footerTime">日报生成时间：加载中...</p>
    </footer>
  </article>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js" onerror="this.src='./_shared/js/echarts.min.js'"></script>
  <script>
    (function() {
      var perfStart = performance.now();

      function getTodayStr() {
        var d = new Date();
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, '0');
        var day = String(d.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + day;
      }

      function formatDateCN(dateStr) {
        var parts = dateStr.split('-');
        var weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
        var d = new Date(parts[0], parts[1]-1, parts[2]);
        return parts[0] + '年' + parts[1] + '月' + parts[2] + '日 ' + weekdays[d.getDay()];
      }

      // Build file suffix based on category + subCategory + tab
      // category: 'drama' | 'ai'
      // subCategory: 'all' | 'nanpin' | 'nvpin'
      // tab: 'hot' | 'rising'
      function getFileSuffix(category, subCategory, tab) {
        var catSuffix = category === 'ai' ? '-ai' : '';
        var subSuffix = subCategory === 'all' ? '' : '-' + subCategory;
        var tabSuffix = tab === 'rising' ? '-rising' : '';
        return catSuffix + subSuffix + tabSuffix;
      }

      function getFallbackFile(category, subCategory, tab) {
        var catSuffix = category === 'ai' ? '-ai' : '';
        var subSuffix = subCategory === 'all' ? '' : '-' + subCategory;
        var tabSuffix = tab === 'rising' ? '-rising' : '';
        return './data/latest' + catSuffix + subSuffix + tabSuffix + '.json';
      }

      function getCategoryMode() {
        return window.currentCategory;
      }

      function isAiMode() {
        return window.currentCategory === 'ai';
      }


      // Single fetch with optional fallback
      function fetchData(dateStr, tab, category, subCategory) {
        category = category || window.currentCategory || 'drama';
        subCategory = subCategory || window.currentSubCategory || 'all';
        tab = tab || window.currentTab || 'hot';
        var suffix = getFileSuffix(category, subCategory, tab);
        var ts = Date.now();
        var dataUrl = './data/' + dateStr + suffix + '.json?_t=' + ts;
        var fallbackUrl = getFallbackFile(category, subCategory, tab) + '?_t=' + ts;

        document.getElementById('loadingState').style.display = 'block';
        document.getElementById('contentState').style.display = 'none';
        document.getElementById('errorState').style.display = 'none';
        document.getElementById('dateDisplay').textContent = formatDateCN(dateStr);

        var chartEl = document.getElementById('chart-heat');
        if (window.echarts) {
          var oldChart = window.echarts.getInstanceByDom(chartEl);
          if (oldChart) oldChart.dispose();
        }

        var fetchStart = performance.now();
        fetch(dataUrl)
          .then(function(r) {
            if (!r.ok) throw new Error('not found');
            return r.json();
          })
          .then(function(data) {
            console.log('[Perf] Data loaded in ' + Math.round(performance.now() - fetchStart) + 'ms');
            render(data);
          })
          .catch(function() {
            fetch(fallbackUrl)
              .then(function(r) {
                if (!r.ok) throw new Error('fallback not found');
                return r.json();
              })
              .then(function(data) {
                console.log('[Perf] Fallback loaded in ' + Math.round(performance.now() - fetchStart) + 'ms');
                render(data);
              })
              .catch(function() {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('errorState').style.display = 'block';
              });
          });
      }

      function loadData() {
        fetchData(getTodayStr(), window.currentTab, window.currentCategory, window.currentSubCategory);
      }

      function render(data) {
        var renderStart = performance.now();
        var cat = getCategoryMode();
        var catClass = cat === 'drama' ? '' : cat;

        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('contentState').style.display = 'block';
        if (data.date) {
          document.getElementById('dateDisplay').textContent = formatDateCN(data.date);
        }

        if (data.statsEndTime) {
          document.getElementById('statsTime').textContent = '统计截止时间：' + data.statsEndTime;
        } else {
          document.getElementById('statsTime').textContent = '统计截止时间：' + (data.date || '') + ' 24:00:00';
        }

        if (data.todayTime) {
          document.getElementById('todayTime').textContent = '今天：' + data.todayTime;
        } else {
          var today = new Date();
          var todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
          document.getElementById('todayTime').textContent = '今天：' + todayStr;
        }

        // Update section titles based on category
        var subCat = window.currentSubCategory || 'all';
        var subCatName = subCat === 'nanpin' ? '男频' : (subCat === 'nvpin' ? '女频' : '');
        var catName = (cat === 'ai' ? 'AI漫剧' : '短剧') + (subCatName ? '-' + subCatName : '');
        var tabName = window.currentTab === 'rising' ? '飙升榜' : '热播榜';
        document.getElementById('overviewTitle').innerHTML = '<span class="icon">📊</span> 今日概览';
        document.getElementById('hotListTitle').innerHTML = '<span class="icon">' + (window.currentTab === 'rising' ? '📈' : '🔥') + '</span> ' + catName + tabName;
        document.getElementById('tagsTitle').innerHTML = '<span class="icon">🏷️</span> 热门题材标签';
        document.getElementById('chartTitle').innerHTML = '<span class="icon">📈</span> 热度趋势对比';
        document.getElementById('insightsTitle').innerHTML = '<span class="icon">💡</span> 行业洞察';
        document.getElementById('upcomingTitle').innerHTML = '<span class="icon">📅</span> 即将上线';

        document.getElementById('overviewTitle').classList.remove('ai-theme', 'nanpin-theme');
        document.getElementById('hotListTitle').classList.remove('ai-theme', 'nanpin-theme');
        if (cat === 'ai') {
          document.getElementById('overviewTitle').classList.add('ai-theme');
          document.getElementById('hotListTitle').classList.add('ai-theme');
        } else if (cat === 'nanpin') {
          document.getElementById('overviewTitle').classList.add('nanpin-theme');
          document.getElementById('hotListTitle').classList.add('nanpin-theme');
        }

        // Build title->analysis map for correct matching
        var analysisMap = {};
        if (data.analysis && data.analysis.length > 0) {
          data.analysis.forEach(function(a) {
            if (a.title) analysisMap[a.title] = a;
          });
        }

        // Overview
        var overviewHTML = '';
        data.overview.forEach(function(item) {
          overviewHTML += '<div class="stat-card"><div class="stat-number ' + catClass + '">' + item.value + '</div><div class="stat-label">' + item.label + '</div></div>';
        });
        document.getElementById('overviewGrid').innerHTML = overviewHTML;

        // Hot list with title-matched analysis
        var listHTML = '';
        var analysisCount = 0;
        data.hotList.forEach(function(item, idx) {
          var rankClass = idx === 0 ? 'top1' : (idx === 1 ? 'top2' : (idx === 2 ? 'top3' : 'other'));
          var analysis = analysisMap[item.title] || null;
          var hasAnalysis = analysis && analysis.summary;
          if (hasAnalysis) analysisCount++;
          var bodyId = 'analysisEmbed' + idx;

          var statusBadge = '';
          var itemStatus = '';
          if (item.new) {
            statusBadge = '<span class="status-badge new-badge ' + catClass + '">新作</span>';
            itemStatus = ' new-item';
          } else if (item.retain) {
            statusBadge = '<span class="status-badge retain-badge ' + catClass + '">蝉联</span>';
            itemStatus = ' retain-item';
          } else if (item.stable) {
            statusBadge = '<span class="status-badge stable-badge ' + catClass + '">稳榜</span>';
            itemStatus = ' stable-item';
          }
          var itemClasses = 'hot-item' + (catClass ? ' ' + catClass : '') + itemStatus;
          listHTML += '<div class="' + itemClasses + '">' +
            '<div class="hot-main">' +
              '<div class="rank ' + rankClass + '">' + (idx + 1) + '</div>' +
              '<div class="hot-info">' +
                '<div class="hot-title"><span class="hot-title-text">' + item.title + '</span>' + statusBadge + '</div>' +
                '<div class="hot-meta">' +
                  '<span>👤 ' + item.cast + '</span>' +
                  '<span>🎬 ' + item.genre + '</span>' +
                  '<span>📺 ' + (item.source || '红果短剧') + '</span>' +
                '</div>' +
              '</div>' +
              '<div class="hot-heat">' +
                '<div class="heat-value ' + catClass + '">' + item.heat + '</div>' +
                '<div class="heat-label">' + item.heatLabel + '</div>' +
              '</div>' +
            '</div>';

          if (hasAnalysis) {
            listHTML += '<div class="analysis-embed" id="' + bodyId + '">' +
              '<div class="analysis-summary">' + analysis.summary + '</div>';

            if (analysis.characters && analysis.characters.length > 0) {
              listHTML += '<div class="analysis-grid">';
              analysis.characters.forEach(function(ch, ci) {
                var blockClass = ci === 0 ? 'analysis-block' + (catClass ? ' ' + catClass : '') : (ci === 1 ? 'analysis-block alt' + (catClass ? '-' + catClass : '') : 'analysis-block blue');
                listHTML += '<div class="' + blockClass + '">' +
                  '<div class="analysis-label">' + ch.role + '</div>' +
                  '<div class="analysis-text">' + ch.desc + '</div>' +
                '</div>';
              });
              listHTML += '</div>';
            }

            if (analysis.plotFlow && analysis.plotFlow.length > 0) {
              listHTML += '<div class="analysis-flow">';
              analysis.plotFlow.forEach(function(step) {
                var dotClass = step.phase === '起' ? 'start' + (catClass ? '-' + catClass : '') : (step.phase === '承' ? 'mid' + (catClass ? '-' + catClass : '') : (step.phase === '转' ? 'turn' : 'end'));
                listHTML += '<div class="flow-step">' +
                  '<div class="flow-dot ' + dotClass + '">' + step.phase + '</div>' +
                  '<div class="flow-content">' +
                    '<strong class="' + catClass + '">' + step.title + '</strong>' +
                    '<p>' + step.desc + '</p>' +
                  '</div>' +
                '</div>';
              });
              listHTML += '</div>';
            }

            if (analysis.sellingPoints && analysis.sellingPoints.length > 0) {
              listHTML += '<div class="sell-points">';
              analysis.sellingPoints.forEach(function(sp) {
                listHTML += '<span class="sell-point ' + catClass + '">' + sp + '</span>';
              });
              listHTML += '</div>';
            }

            listHTML += '</div>' +
              '<div style="padding:0 1.25rem 1rem;">' +
                '<button class="analysis-toggle ' + catClass + '" onclick="toggleEmbed(\'' + bodyId + '\', this)">展开分析 ▼</button>' +
              '</div>';
          }

          listHTML += '</div>';
        });
        document.getElementById('hotList').innerHTML = listHTML;
        console.log('[Perf] Analysis buttons: ' + analysisCount + '/' + data.hotList.length);

        if (data.tags) {
          var tagsHTML = '';
          data.tags.forEach(function(tag) {
            var cls = tag.hot ? 'tag hot' + (catClass ? '-' + catClass : '') : (tag.new ? 'tag new' : 'tag');
            tagsHTML += '<span class="' + cls + '">' + tag.text + '</span>';
          });
          document.getElementById('tagCloud').innerHTML = tagsHTML;
        }

        if (data.insights) {
          var insightsHTML = '';
          data.insights.forEach(function(insight) {
            insightsHTML += '<div class="insight-box ' + catClass + '"><h4>' + insight.title + '</h4><p>' + insight.content + '</p></div>';
          });
          document.getElementById('insights').innerHTML = insightsHTML;
        }

        if (data.upcoming) {
          var upcomingHTML = '';
          data.upcoming.forEach(function(item) {
            upcomingHTML += '<div class="hot-item"><div class="hot-main">' +
              '<div class="rank other">' + item.date + '</div>' +
              '<div class="hot-info">' +
                '<div class="hot-title"><span class="hot-title-text">' + item.title + '</span></div>' +
                '<div class="hot-meta">' +
                  '<span>👤 ' + item.cast + '</span>' +
                  '<span>🎬 ' + item.genre + '</span>' +
                  '<span>📺 ' + (item.source || '红果短剧') + '</span>' +
                '</div>' +
              '</div>' +
              '<div class="hot-heat">' +
                '<div class="heat-value">' + item.heat + '</div>' +
                '<div class="heat-label">预约量</div>' +
              '</div>' +
            '</div></div>';
          });
          document.getElementById('upcomingList').innerHTML = upcomingHTML;
        }

        document.getElementById('footerTime').textContent = '日报生成时间：' + (data.generatedAt || '未知');

        renderChart(data.hotList);
        console.log('[Perf] Total render: ' + Math.round(performance.now() - renderStart) + 'ms');
        console.log('[Perf] Page ready: ' + Math.round(performance.now() - perfStart) + 'ms');
      }

      window.toggleEmbed = function(bodyId, btn) {
        var body = document.getElementById(bodyId);
        if (body.classList.contains('open')) {
          body.classList.remove('open');
          btn.textContent = '展开分析 ▼';
        } else {
          body.classList.add('open');
          btn.textContent = '收起分析 ▲';
        }
      };

      function renderChart(hotList) {
        if (!window.echarts) {
          console.warn('ECharts not loaded yet, chart skipped');
          return;
        }
        var cat = getCategoryMode();
        var catClass = cat === 'drama' ? '' : cat;
        var chart = window.echarts.init(document.getElementById('chart-heat'), null, { renderer: 'svg' });
        var dramas = hotList.map(function(d) { return d.titleShort || d.title.substring(0, 6); });
        var heatData = hotList.map(function(d) {
          var num = parseFloat(d.heat.replace(/[^0-9.]/g, ''));
          return num;
        });
        var accentColor = cat === 'ai' ? '#1e90ff' : (cat === 'nanpin' ? '#b8860b' : (cat === 'nvpin' ? '#e84393' : '#ff4757'));
        var accent2Color = cat === 'ai' ? '#00d2d3' : (cat === 'nanpin' ? '#ffd700' : (cat === 'nvpin' ? '#fd79a8' : '#ffa502'));
        chart.setOption({
          animation: false,
          tooltip: {
            trigger: 'axis', appendToBody: true,
            axisPointer: { type: 'shadow' },
            formatter: function(params) { return params[0].name + '<br/>热度: ' + params[0].value + (window.currentTab === 'rising' ? '%' : '万'); }
          },
          grid: { left: '3%', right: '4%', bottom: '3%', top: '5%', containLabel: true },
          xAxis: {
            type: 'category', data: dramas,
            axisLabel: { color: '#888', fontSize: 11, rotate: 30, interval: 0 },
            axisLine: { lineStyle: { color: '#333' } }, axisTick: { show: false }
          },
          yAxis: {
            type: 'value', name: window.currentTab === 'rising' ? '涨幅（%）' : '热度（万）',
            nameTextStyle: { color: '#888', fontSize: 12 },
            axisLabel: { color: '#888', fontSize: 11 },
            axisLine: { show: false },
            splitLine: { lineStyle: { color: '#333', type: 'dashed' } }
          },
          series: [{
            type: 'bar',
            data: heatData.map(function(val, idx) {
              return {
                value: val,
                itemStyle: {
                  color: idx === 0 ? accentColor : (idx < 3 ? accent2Color : '#88888888'),
                  borderRadius: [4, 4, 0, 0]
                }
              };
            }),
            barWidth: '60%',
            label: { show: true, position: 'top', color: '#f0f0f0', fontSize: 11, formatter: window.currentTab === 'rising' ? '{c}%' : '{c}万' }
          }]
        });
        window.addEventListener('resize', function() { chart.resize(); });
      }

      // Category switching (main: drama / ai)
      window.currentCategory = 'drama';
      window.switchCategory = function(category) {
        window.currentCategory = category;
        document.getElementById('catDrama').classList.toggle('active', category === 'drama');
        document.getElementById('catDrama').classList.toggle('drama', category === 'drama');
        document.getElementById('catAi').classList.toggle('active', category === 'ai');
        document.getElementById('catAi').classList.toggle('ai', category === 'ai');

        // Update sub-category button AI styling
        var subBtns = document.querySelectorAll('.sub-category-btn');
        subBtns.forEach(function(btn) {
          btn.classList.toggle('ai', category === 'ai');
        });

        // Update header border color
        var header = document.querySelector('.daily-header');
        if (category === 'ai') {
          header.style.borderBottomColor = 'var(--ai-accent)';
          document.querySelector('.daily-header h1').textContent = '红果AI漫剧热榜日报';
          document.querySelector('.daily-header .subtitle').textContent = 'AI生成漫剧每日热度排行追踪';
          document.title = '红果AI漫剧热榜日报';
        } else {
          header.style.borderBottomColor = 'var(--accent)';
          document.querySelector('.daily-header h1').textContent = '红果短剧热榜日报';
          document.querySelector('.daily-header .subtitle').textContent = '抖音旗下红果短剧平台每日热度排行追踪';
          document.title = '红果短剧热榜日报';
        }

        var dateStr = document.getElementById('datePicker').value || getTodayStr();
        fetchData(dateStr, window.currentTab, category, window.currentSubCategory);
      };

      // Sub-category switching (all / nanpin / nvpin)
      window.currentSubCategory = 'all';
      window.switchSubCategory = function(subCategory) {
        window.currentSubCategory = subCategory;
        document.getElementById('subAll').classList.toggle('active', subCategory === 'all');
        document.getElementById('subNanpin').classList.toggle('active', subCategory === 'nanpin');
        document.getElementById('subNvpin').classList.toggle('active', subCategory === 'nvpin');

        var dateStr = document.getElementById('datePicker').value || getTodayStr();
        fetchData(dateStr, window.currentTab, window.currentCategory, subCategory);
      };

      // Tab switching (sub: hot / rising)
      window.currentTab = 'hot';
      window.switchTab = function(tab) {
        window.currentTab = tab;
        document.getElementById('tabHot').classList.toggle('active', tab === 'hot');
        document.getElementById('tabRising').classList.toggle('active', tab === 'rising');
        var dateStr = document.getElementById('datePicker').value || getTodayStr();
        fetchData(dateStr, tab, window.currentCategory, window.currentSubCategory);
      };

      // Date picker
      var datePicker = document.getElementById('datePicker');
      var btnToday = document.getElementById('btnToday');
      var currentDateStr = getTodayStr();
      datePicker.max = getTodayStr();
      datePicker.value = currentDateStr;

      datePicker.addEventListener('change', function() {
        var selected = datePicker.value;
        if (!selected) return;
        currentDateStr = selected;
        fetchData(selected, window.currentTab, window.currentCategory, window.currentSubCategory);
      });

      btnToday.addEventListener('click', function() {
        var today = getTodayStr();
        datePicker.value = today;
        currentDateStr = today;
        fetchData(today, window.currentTab, window.currentCategory, window.currentSubCategory);
      });

      loadData();
    })();
  </script>
</body>
</html>
